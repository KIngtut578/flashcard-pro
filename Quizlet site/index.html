<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Flashcard Pro</title>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; background: #f0f2f5; padding: 20px; }
        .card-box { width: 400px; height: 250px; perspective: 1000px; cursor: pointer; margin-bottom: 20px; }
        .card-inner { position: relative; width: 100%; height: 100%; transition: transform 0.6s; transform-style: preserve-3d; }
        .is-flipped { transform: rotateY(180deg); }
        .front, .back { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; display: flex; align-items: center; justify-content: center; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); font-size: 22px; padding: 20px; text-align: center; box-sizing: border-box; }
        .front { background: white; border: 2px solid #3b82f6; }
        .back { background: #3b82f6; color: white; transform: rotateY(180deg); }
        .btn { padding: 10px 20px; cursor: pointer; border-radius: 5px; border: none; background: #3b82f6; color: white; font-weight: bold; }
        .btn-add { background: #10b981; width: 100%; margin-top: 10px; }
        .form-container { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); width: 360px; margin-top: 30px; }
        input, textarea { width: 100%; margin-bottom: 10px; padding: 10px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 4px; }
    </style>
</head>
<body>

    <h1>Quizlet Clone</h1>

    <div class="card-box" onclick="flip()">
        <div class="card-inner" id="cardElement">
            <div class="front" id="frontText">Term goes here</div>
            <div class="back" id="backText">Definition goes here</div>
        </div>
    </div>

    <div>
        <button class="btn" onclick="prev()">Back</button>
        <span id="counter">1 / 1</span>
        <button class="btn" onclick="next()">Next</button>
    </div>

    <div class="form-container">
        <h3>Add New Card</h3>
        <input type="text" id="inTerm" placeholder="Term (e.g. HTML)">
        <textarea id="inDef" placeholder="Definition"></textarea>
        <button class="btn btn-add" onclick="addNew()">Add to Deck</button>
    </div>

<button class="btn" style="background: red; margin-top: 20px;" onclick="clearDeck()">Clear Everything</button>
    
    <script>
        // Data
        let deck = JSON.parse(localStorage.getItem('myQuizletDeck')) || [
    { t: "Example Term", d: "Example Definition" }
];
        let index = 0;

        // Elements
        const card = document.getElementById('cardElement');
        const front = document.getElementById('frontText');
        const back = document.getElementById('backText');
        const counter = document.getElementById('counter');

        function updateUI() {
            card.classList.remove('is-flipped');
            front.innerText = deck[index].t;
            back.innerText = deck[index].d;
            counter.innerText = `${index + 1} / ${deck.length}`;
        }

        function flip() {
            card.classList.toggle('is-flipped');
        }

        function next() {
            if (index < deck.length - 1) { index++; updateUI(); }
        }

        function prev() {
            if (index > 0) { index--; updateUI(); }
        }

       function addNew() {
    const termVal = document.getElementById('inTerm').value;
    const defVal = document.getElementById('inDef').value;

    if (!termVal || !defVal) return;

    deck.push({ t: termVal, d: defVal });
    
    // --- THIS IS THE KEY ADDITION ---
    saveToStorage(); 
    // --------------------------------

    document.getElementById('inTerm').value = "";
    document.getElementById('inDef').value = "";
    index = deck.length - 1;
    updateUI();
}
        // Run once on load
        updateUI();

        function saveToStorage() {
    localStorage.setItem('myQuizletDeck', JSON.stringify(deck));
}

function clearDeck() {
    if(confirm("Are you sure? This deletes everything!")) {
        localStorage.removeItem('myQuizletDeck');
        location.reload(); // Refresh the page to reset
    }
}

    </script>
</body>
</html>
